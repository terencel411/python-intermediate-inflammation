name: CI

# when does this github action run?
on: push

# define a single job for now (can add more)
jobs: 
  build:
    
    # can also specify the OS to run the test on
    runs-on: ubuntu-22.04

    # a job has a series of steps
    steps:

    - name: Checkout respository
      uses: actions/checkout@v5

    - name: Set up python version
      uses: actions/setup-python@v6
      with:
        python-version: "python 3.10.12"

    - name: Install python dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r requirements.txt .

    - name: Test with PyTest
      run: |
         python3 -m pytest --cov=inflammation.models --cov-report term-missing tests/test_models.py
